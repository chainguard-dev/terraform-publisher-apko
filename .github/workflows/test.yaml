name: Tests
on:
  pull_request_target: # To test cosign signing.
    branches: ['main']
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      if: github.event_name == 'pull_request_target'
      with:
        ref: refs/pull/${{ github.event.pull_request.number }}/merge
        persist-credentials: false

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      if: github.event_name != 'pull_request_target'
      with:
        persist-credentials: false

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.22'
        check-latest: true

    - uses: chainguard-dev/actions/setup-registry@de68b87302e6266db5fb5220246f8aa46fe94b67 # main
      with:
        port: 5000

    - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: '1.8.*'
        terraform_wrapper: false

    - working-directory: ./examples/static
      env:
        TF_VAR_target_repository: localhost:5000/static
        TF_VAR_verify: ${{github.event_name == 'pull_request_target'}}
      run: |
        terraform init -upgrade
        terraform apply -auto-approve

    # Test with archs and check_sbom=false
    - working-directory: ./examples/static
      env:
        TF_VAR_target_repository: localhost:5000/static
        TF_VAR_archs: '["x86_64"]'
        TF_VAR_check_sbom: 'false'
        TF_VAR_verify: ${{github.event_name == 'pull_request_target'}}
      run: |
        terraform init -upgrade
        terraform apply -auto-approve
