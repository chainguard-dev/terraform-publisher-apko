name: Tests
on:
  pull_request_target: # To test cosign signing.
    branches: ['main']
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      if: github.event_name == 'pull_request_target'
      with:
        ref: refs/pull/${{ github.event.pull_request.number }}/merge

    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      if: github.event_name != 'pull_request_target'

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.22'
        check-latest: true

    - uses: chainguard-dev/actions/setup-registry@061bc0e921116bde1470f51fb5c86d5318f16558 # main
      with:
        port: 5000

    - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      with:
        terraform_version: '1.8.*'
        terraform_wrapper: false

    - working-directory: ./examples/static
      env:
        TF_VAR_target_repository: localhost:5000/static
        TF_VAR_verify: ${{github.event_name == 'pull_request_target'}}
      run: |
        terraform init -upgrade
        terraform apply -auto-approve

    # Test with archs and check_sbom=false
    - working-directory: ./examples/static
      env:
        TF_VAR_target_repository: localhost:5000/static
        TF_VAR_archs: '["x86_64"]'
        TF_VAR_check_sbom: 'false'
        TF_VAR_verify: ${{github.event_name == 'pull_request_target'}}
      run: |
        terraform init -upgrade
        terraform apply -auto-approve
